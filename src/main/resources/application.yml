server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

spring:
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 0
      max-file-size: 10MB
      max-request-size: 100MB
  mail:
    host: smtp.163.com
    username: ${MAIL_USERNAME:lsj18938740943@163.com}
    password: ${MAIL_PASSWORD:MYRTLXBGXBGRWOUU}
    default-encoding: utf-8

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    url: ${DB_URL:jdbc:mysql://localhost:3306/cov?serverTimezone=GMT%2B8&useUnicode=true&characterEncoding=utf8}
    druid:
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:admin}
        login-password: ${DRUID_PASSWORD:admin123}
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
        wall:
          enabled: true
  initialization-mode: never  # 重要：确保初始化模式开启

  jpa:
    hibernate:
      ddl-auto: none   # 关闭JPA自动DDL，使用显式SQL脚本管理数据库
    show-sql: true
    generate-ddl: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  sql:
    init:
      mode: always
      platform: mysql
      schema-locations: classpath:db/init.sql
      encoding: utf-8


mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml
  type-aliases-package: com.tem.booksys.entity
  #开启驼峰命名 驼峰命名和数据库中的下划线对应
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /docs
    url: /v3/api-docs
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.tem.booksys.controller

# BookSys 自定义配置
booksys:
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-guangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
    bucket-name: ${OSS_BUCKET_NAME:ryan4real}
  baidu-ai:
    api-key: ${BAIDU_AI_API_KEY:}
    secret-key: ${BAIDU_AI_SECRET_KEY:}
  jwt:
    secret: ${JWT_SECRET:BookSys@2024!SecretKey}
    expiration-hours: 1
  python:
    python-path: ${PYTHON_PATH:python}
    script-path: ${PYTHON_SCRIPT:barcode.py}

